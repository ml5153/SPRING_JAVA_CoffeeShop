spring:
  application:
    name: p_coffeeshop
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update       # ?? ?? update, ??? none
    show-sql: true           # ?? ??? ??
    properties:
      hibernate:
        format_sql: true     # ?? ?? ?? ??
    open-in-view: false

  data:
    jpa:
      repositories:
        enabled: true